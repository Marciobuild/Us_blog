<header class="site-header" role="banner">
    <div class="container site-header__inner">
        <a href="{% url 'home' %}" class="site-logo" aria-label="US_blog — página inicial">
            <span class="site-logo__icon" aria-hidden="true">US</span>
            <span>US_blog</span>
        </a>

        <nav class="site-nav" aria-label="Navegação principal">
            <a href="{% url 'home' %}" class="site-nav__link{% if request.resolver_match.url_name == 'home' %} site-nav__link--active{% endif %}">Blog</a>
            {% if user.is_authenticated %}
                <a href="{% url 'CriarPost' %}" class="site-nav__link{% if request.resolver_match.url_name == 'CriarPost' %} site-nav__link--active{% endif %}">Novo Post</a>
            {% endif %}
        </nav>

        <div class="site-header__actions">
            {% if user.is_authenticated %}
                <span class="user-greeting">Olá, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn--ghost btn--sm">Sair</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn--secondary btn--sm">Entrar</a>
                <a href="{% url 'registro' %}" class="btn btn--primary btn--sm">Registrar</a>
            {% endif %}

            <button type="button" class="theme-toggle" data-theme-toggle aria-label="Alternar tema claro/escuro">
                <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">☀</span>
                <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">☾</span>
            </button>

            <button type="button" class="nav-toggle" data-nav-toggle aria-expanded="false" aria-controls="mobile-nav" aria-label="Abrir menu">
                <span class="nav-toggle__bar"></span>
                <span class="nav-toggle__bar"></span>
                <span class="nav-toggle__bar"></span>
            </button>
        </div>
    </div>

    <nav class="mobile-nav" id="mobile-nav" data-mobile-nav aria-label="Navegação mobile">
        <a href="{% url 'home' %}" class="mobile-nav__link">Blog</a>
        {% if user.is_authenticated %}
            <a href="{% url 'CriarPost' %}" class="mobile-nav__link">Novo Post</a>
            <a href="{% url 'logout' %}" class="mobile-nav__link">Sair</a>
        {% else %}
            <a href="{% url 'login' %}" class="mobile-nav__link">Entrar</a>
            <a href="{% url 'registro' %}" class="mobile-nav__link">Registrar</a>
        {% endif %}
    </nav>
</header>
