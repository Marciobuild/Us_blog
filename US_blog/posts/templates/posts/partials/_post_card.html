<article class="post-card">
    <div class="post-card__body">
        <div class="post-card__meta">
            <time class="post-card__date" datetime="{{ post.data_de_criacao|date:'Y-m-d' }}">
                {{ post.data_de_criacao|date:"d M Y" }}
            </time>
            {% if post.categoria %}
                <a href="{% url 'home' %}?categoria={{ post.categoria.slug }}" class="category-badge">{{ post.categoria.nome }}</a>
            {% endif %}
        </div>
        <h2 class="post-card__title">
            <a href="{% url 'PostDetalhes' post.pk %}">{{ post.titulo }}</a>
        </h2>
        <p class="post-card__excerpt">{{ post.conteudo|truncatewords:30 }}</p>
        {% if post.tags.exists %}
        <div class="tag-list" style="margin-bottom: 1rem;">
            {% for tag in post.tags.all %}
                <a href="{% url 'home' %}?tag={{ tag.slug }}" class="tag">{{ tag.nome }}</a>
            {% endfor %}
        </div>
        {% endif %}
        <footer class="post-card__footer">
            <a href="{% url 'PostDetalhes' post.pk %}" class="read-more">
                Ler mais <span class="read-more__arrow" aria-hidden="true">→</span>
            </a>
        </footer>
    </div>
</article>
