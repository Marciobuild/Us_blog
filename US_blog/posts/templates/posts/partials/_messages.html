{% if messages %}
<div class="container" style="padding-top: 1rem;">
    {% for message in messages %}
        <div class="alert alert--{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}success{% endif %}" role="alert">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}
